name: tfile_frontend
description: Telegram-backed file library — core config & API client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.4
  path: ^1.9.0
  encrypt: ^5.0.3
  crypto: ^3.0.6
  dio: ^5.7.0
  flutter_image_compress: ^2.3.0
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
